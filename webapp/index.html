<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sol de Mañana — Подписка</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
    }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .subtitle { color: #888; margin: 0 0 20px; font-size: 14px; }
    .plan {
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .plan.current { border-color: #4caf50; background: #f1f8f1; }
    .plan h2 { margin: 0 0 4px; font-size: 17px; display: flex; align-items: center; gap: 8px; }
    .badge {
      font-size: 11px;
      background: #4caf50;
      color: #fff;
      border-radius: 4px;
      padding: 2px 7px;
    }
    .price { font-size: 22px; font-weight: 700; margin: 6px 0 10px; }
    .features { margin: 0 0 12px; padding-left: 18px; font-size: 14px; }
    .features li { margin-bottom: 4px; }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-sizing: border-box;
    }
    .btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <h1>Sol de Mañana</h1>
  <p class="subtitle">Выбери план подписки</p>

  <div class="plan" id="plan-free">
    <h2>Free <span class="badge" id="badge-free" style="display:none">Текущий</span></h2>
    <div class="price">Бесплатно</div>
    <ul class="features">
      <li>10 сообщений в день</li>
      <li>Диалоговый режим</li>
    </ul>
  </div>

  <div class="plan" id="plan-basic">
    <h2>Basic <span class="badge" id="badge-basic" style="display:none">Текущий</span></h2>
    <div class="price" id="price-basic">150 ⭐</div>
    <ul class="features">
      <li>100 сообщений в день</li>
      <li>Диалоговый режим</li>
    </ul>
    <button class="btn" id="btn-basic" onclick="subscribe('basic')">Выбрать Basic</button>
  </div>

  <div class="plan" id="plan-premium">
    <h2>Premium <span class="badge" id="badge-premium" style="display:none">Текущий</span></h2>
    <div class="price" id="price-premium">500 ⭐</div>
    <ul class="features">
      <li>300 сообщений в день</li>
      <li>Диалоговый режим</li>
      <li>Режим переводчика (скоро)</li>
    </ul>
    <button class="btn" id="btn-premium" onclick="subscribe('premium')">Выбрать Premium</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const currentPlan = params.get('plan') || 'free';
    const basicPrice = params.get('basic_price') || '150';
    const premiumPrice = params.get('premium_price') || '500';

    document.getElementById('price-basic').textContent = basicPrice + ' ⭐';
    document.getElementById('price-premium').textContent = premiumPrice + ' ⭐';

    const badge = document.getElementById('badge-' + currentPlan);
    if (badge) {
      badge.style.display = 'inline';
      document.getElementById('plan-' + currentPlan).classList.add('current');
    }

    if (currentPlan === 'basic') {
      const btn = document.getElementById('btn-basic');
      btn.textContent = 'Текущий план';
      btn.disabled = true;
    }
    if (currentPlan === 'premium') {
      const btn = document.getElementById('btn-premium');
      btn.textContent = 'Текущий план';
      btn.disabled = true;
      document.getElementById('btn-basic').disabled = false;
    }

    function subscribe(plan) {
      tg.sendData('subscribe:' + plan);
    }
  </script>
</body>
</html>
